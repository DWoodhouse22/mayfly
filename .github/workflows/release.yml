name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -o dist/mayfly-windows-amd64.exe ./cmd/mayfly/
          GOOS=windows GOARCH=arm64 go build -o dist/mayfly-windows-arm64.exe ./cmd/mayfly/
          GOOS=windows GOARCH=arm go build -o dist/mayfly-windows-arm.exe ./cmd/mayfly/
          GOOS=windows GOARCH=386 go build -o dist/mayfly-windows-x86.exe ./cmd/mayfly/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: dist/*
